<div class="home-body">
  <div *ngIf="!showScreenSaver" class="light-bar"
    [ngStyle]="prevent_toggle ? {'pointer-events':'none'} : {'pointer-events':'initial'}">
    <div class="light-backdrop">
      <div *ngIf="!show_brightness_slider" class="switch-panel">
        <div class="switch-backdrop">
          <ui-switch size="small" [(ngModel)]="light_state[5]" (change)="onLightBtnChange(5)"></ui-switch>
        </div>
        <div class="switch-backdrop">
          <ui-switch size="small" [(ngModel)]="light_state[4]" (change)="onLightBtnChange(4)"></ui-switch>
        </div>
        <div class="switch-backdrop">
          <ui-switch size="small" [(ngModel)]="light_state[3]" (change)="onLightBtnChange(3)"></ui-switch>
        </div>
        <div class="switch-backdrop">
          <ui-switch size="small" [(ngModel)]="light_state[2]" (change)="onLightBtnChange(2)"></ui-switch>
        </div>
        <div class="switch-backdrop">
          <ui-switch size="small" [(ngModel)]=" light_state[1]" (change)="onLightBtnChange(1)"></ui-switch>
        </div>
      </div>
      <div *ngIf="show_brightness_slider" class="birghtness-slider">
        <ngx-slider [(ngModel)]="brightness_level" [options]="slider_options"
          (userChangeEnd)="onLightBrightnessChange()"></ngx-slider>
      </div>
      <div class="brightness-button">
        <svg width="50" height="50" viewBox="0 0 61.165 61.165">

  </div>
  <div *ngIf="!showScreenSaver" class="content-space">
    <div class="top-bar" style="justify-content: center;">
      <div *ngIf="show_maintenance_screen || show_settings_screen" style="position: absolute;left:225px">
        <h2>Timeout- {{countdown}}</h2>
      </div>
      <div></div>
      <div class="clock-pane">
        <h2 style="margin-top:4px;">{{ time | date: 'hh:mm:ss a' }}</h2>
        <p style="margin-top:-15px;">{{ time | date: 'dd/MM/YY' }}</p>
      </div>

      <div style="display: flex;align-items: center;gap: 5px;position: absolute;right: 0;">

        <div style="display: flex;column-gap: 5px;height: 35px;" *ngIf="show_maintenance_screen">
          <div (click)="showGuide()">
            <img class="info bounce" style="height: 38px;width: 35px;margin:0" src="../assets/images/user_guide.png"
              alt="">
          </div>
          <div (click)="showCharts()">
            <img class="info bounce" style="height: 34px;width: 35px;" src="../assets/images/graph.svg" alt="">
          </div>
          <!-- <div (click)="resetUserError()">
            <img class="info bounce" style="height: 35px;width: 35px;" src="../assets/images/user_error.jpg" alt="">
          </div> -->
          <div (click)="openFlushPopUp()">
            <img class="info bounce" style="height: 45px;width: 45px;margin-top: -1px;margin-left: -3px;"
              src="../assets/images/Flush_new.svg" alt="Flush">
          </div>
          <div (click)="openTopupPopUp()">
            <img class="info bounce" style="height: 45px;width: 45px;margin-top: -1px;margin-left: -3px;"
              src="../assets/images/Topup_new.svg" alt="Topup">
          </div>
        </div>

        <div style="display: flex;gap: 5px;height: 35px;" *ngIf="show_settings_screen">
          <a mat-button disableOneSec style="padding: 0;min-width: auto;" [ngClass]="{'disable-class':isDisabled}"
            (click)="update();isDisabled=true">
            <img class="update bounce" src="../assets/images/update.png" alt="">
          </a>
        </div>
        <div *ngIf="isShowResetAlarm && !show_settings_screen " (click)="reserAlarm()" class="p-r-10">
          <img class="info bounce" src="../assets/images/reset-error.png" alt="">
        </div>
        <div *ngIf="!show_settings_screen && !show_maintenance_screen" (click)="showSensors()" class="p-r-10">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="35" height="35" fill="white">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" />
          </svg>
        </div>
        <!-- <img src="../assets/images/wifi/wifi_not_connected.svg" style="width: 35px;height: 35px"/> -->
        <img *ngIf="wifi_signal_image &&!show_settings_screen && !show_maintenance_screen"
          style="width: 2.3rem;padding-right: 5px;" [src]="wifi_signal_image" alt="">
        <div (click)="showInfo();isShowResetAlarm = !isShowResetAlarm" class="p-r-10">
          <img class="info bounce" style="width: 35px;height: 35px;" src="../assets/images/info-icon-23.png" alt="">
        </div>
      </div>

    </div>
    <div style="z-index: 0 !important;" #mainContent>
      <app-mainstatus [meterData]="meterData" [allData]="allData" (screenChanged)="currentMainScreen = $event"
        *ngIf="!show_settings_screen && !show_maintenance_screen && !show_info_screen && !show_sensors_screen"></app-mainstatus>
      <app-sensors *ngIf="show_sensors_screen" [allData]="allData"></app-sensors>
      <app-settings (screenSaverData)="screenSaverData($event)"
        *ngIf="show_settings_screen && !show_maintenance_screen && !show_info_screen"></app-settings>
      <app-maintenance *ngIf="show_maintenance_screen && !show_settings_screen && !show_info_screen"></app-maintenance>
      <app-info *ngIf="show_info_screen && !show_maintenance_screen && !show_settings_screen" [meterData]="meterData"
        [allData]="allData"></app-info>
    </div>
    <div class="footer">

        font-size: 18px; display: flex; align-items: center; color: #374151; text-align: center; justify-content: center;
        margin-right: 280px; min-width: 800px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">

  <div style="width: 100%;height: 100%;" *ngIf="showScreenSaver">
    <div class="screen-save-element" [ngStyle]="{'background-image': 'url(' + screen_saver_img + ')'}"></div>
  </div>
</div>
