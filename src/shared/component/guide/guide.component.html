<div style="transition: all .2s ease-in-out !important;">
    <div style="overflow: hidden;">
        <div class="header-bg">
            <div></div>
            <img style="height: 25px;padding-right: 10px;" class="close-icon" src="../../../assets/images/close.png"
                (click)="dialogRef.close()" />
        </div>


        <div
            style="display: flex;justify-content: space-between;width: 100%;padding: 5px;column-gap: 5px;height: 20rem;">
            <div style="width:40%">
                <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start">
                    <mat-tab label="Video">
                        <div style="display: flex;flex-direction: column;height: 73%;
                        overflow-y: auto;">
                            <ng-container *ngFor=" let video of video_list">
                                <a mat-raised-button
                                    style="text-align: left;width: 98%;background-color: whitesmoke;margin-top: 5px;"
                                    (click)="showVideo(video)">
                                    <mat-icon matSuffix>movie</mat-icon> {{video.name}}</a>
                            </ng-container>

                        </div>
                    </mat-tab>
                    <mat-tab label="Pdf">
                        <div style="display: flex;flex-direction: column;height: 95%;
                        overflow-y: auto;">
                            <ng-container *ngFor=" let pdf of pdf_list">
                                <a mat-raised-button
                                    style="text-align: left;width: 98%;background-color: whitesmoke;margin-top: 5px;"
                                    (click)="showPdf(pdf)">
                                    <mat-icon matSuffix>folder</mat-icon> {{pdf.name}}</a>
                            </ng-container>

                        </div>
                    </mat-tab>

                </mat-tab-group>
            </div>
            <div style="width: 60%;">
                <div *ngIf="media_type=='VIDEO'" id="media">
                    <video style="width: 100%;height: 19.999rem;" controlsList="nodownload" disablePictureInPicture
                        controls disableRemotePlayback disableFullScreen [src]="video_url" autoplay>
                    </video>
                </div>

                <iframe *ngIf="media_type=='PDF'" style="height: 100%;width: 100%;" [src]=" pdf_url"
                    [frameBorder]="0"></iframe>
            </div>


        </div>

    </div>
</div>
